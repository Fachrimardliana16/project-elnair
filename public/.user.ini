; ── PHP-FPM Output Compression ─────────────────────────────────────────────
; Enables PHP-level gzip for ALL PHP responses (HTML pages, API, etc.)
; This is required because cPanel shared hosting uses PHP-FPM/FastCGI which
; bypasses Apache mod_deflate — so Apache cannot compress PHP output directly.
; zlib handles compression transparently, sets Content-Encoding: gzip header.
zlib.output_compression = On
zlib.output_compression_level = 6
